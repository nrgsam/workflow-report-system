<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Archives — WORKFLOW Inc.</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="styles/archive.css"/>
</head>
<body>

  <!-- ── Top Navbar ── -->
  <header class="top-navbar">
    <div class="navbar-brand">
      <span class="brand-name">Dashboard</span>
    </div>
    <div class="navbar-right">
      <div class="bell-wrap">
        <span class="bell">🔔</span>
        <span class="bell-dot"></span>
      </div>
      <div class="user-pill">
        <span class="user-avatar">👤</span>
        <span class="user-label" id="userLabel">Narges</span>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>
  </header>

  <!-- ── Layout ── -->
  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-section-label">NAVIGATION</div>
      <nav>
        <a href="dashboard.html" class="nav-item">
          <span class="nav-icon">📊</span> Dashboard
        </a>
        <a href="archive.html" class="nav-item active">
          <span class="nav-icon">📄</span> Archives
        </a>
        <a href="settings.html" class="nav-item">
          <span class="nav-icon">⚙️</span> Settings
        </a>
      </nav>
    </aside>

    <!-- Main content -->
    <main class="main-content">

      <h2 class="page-title">📋 Team Report History</h2>

      <!-- Filters -->
      <div class="filter-row">
        <input
          type="text"
          class="filter-input"
          id="searchInput"
          placeholder="🔍 Search tasks..."
          oninput="renderTable()"
        />
        <input
          type="date"
          class="filter-input"
          id="filterDate"
          oninput="renderTable()"
        />
        <button class="btn-clear" onclick="clearFilters()">✖ Clear</button>
      </div>

      <!-- Table -->
      <div class="table-wrap">
        <table class="report-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Shift</th>
              <th>Tasks Summary</th>
              <th>Blockers</th>
              <th>Mood</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <!-- rows injected by JS -->
          </tbody>
        </table>
        <div class="empty-state" id="emptyState" style="display:none;">
          No reports found. Submit your first report from the Dashboard!
        </div>
      </div>

      <!-- Pagination -->
      <div class="pagination-row" id="paginationRow"></div>

    </main>
  </div>

  <script>
    const ROWS_PER_PAGE = 5;
    let currentPage = 1;

    window.addEventListener('DOMContentLoaded', () => {
      // Show username
      const raw = localStorage.getItem('user') || sessionStorage.getItem('user');
      if (raw) {
        try {
          const { name } = JSON.parse(raw);
          document.getElementById('userLabel').textContent = name + ' (Out)';
        } catch {}
      }
      renderTable();
    });

    function getReports() {
      return JSON.parse(localStorage.getItem('wf_reports') || '[]');
    }

    function renderTable() {
      const search    = document.getElementById('searchInput').value.toLowerCase();
      const dateFilter = document.getElementById('filterDate').value;
      const tbody     = document.getElementById('tableBody');
      const emptyState = document.getElementById('emptyState');

      let reports = getReports();

      // Filter
      if (search) {
        reports = reports.filter(r =>
          r.tasks.toLowerCase().includes(search) ||
          (r.blockers && r.blockers.toLowerCase().includes(search))
        );
      }
      if (dateFilter) {
        reports = reports.filter(r => r.date === dateFilter);
      }

      // Pagination
      const total = reports.length;
      const totalPages = Math.max(1, Math.ceil(total / ROWS_PER_PAGE));
      if (currentPage > totalPages) currentPage = totalPages;

      const start = (currentPage - 1) * ROWS_PER_PAGE;
      const paged = reports.slice(start, start + ROWS_PER_PAGE);

      // Empty state
      if (total === 0) {
        tbody.innerHTML = '';
        emptyState.style.display = 'block';
        document.getElementById('paginationRow').innerHTML = '';
        return;
      }
      emptyState.style.display = 'none';

      // Render rows
      tbody.innerHTML = paged.map(r => {
        const statusClass = r.status === 'BLOCKER' ? 'badge-blocker' : 'badge-success';
        const statusLabel = r.status === 'BLOCKER'
          ? '🔴 BLOCKER'
          : '🟢 Success';
        const moodEmoji = { productive: '💚', okay: '💛', burned: '🔴' }[r.mood] || '💛';

        return `
          <tr>
            <td>${formatDate(r.date)}</td>
            <td><span class="shift-label">${r.shift}</span></td>
            <td class="tasks-cell">${escHtml(r.tasks)}</td>
            <td class="tasks-cell">${r.blockers ? escHtml(r.blockers) : '<span class="none-label">—</span>'}</td>
            <td>${moodEmoji}</td>
            <td><span class="badge ${statusClass}">${statusLabel}</span></td>
          </tr>`;
      }).join('');

      // Pagination controls
      renderPagination(totalPages, total);
    }

    function renderPagination(totalPages, total) {
      const row = document.getElementById('paginationRow');
      if (totalPages <= 1) { row.innerHTML = `<span class="page-info">Showing ${total} entr${total === 1 ? 'y' : 'ies'}</span>`; return; }

      let html = `<span class="page-info">Page ${currentPage} of ${totalPages} &nbsp;·&nbsp; ${total} entries</span>`;
      html += `<div class="page-btns">`;
      html += `<button class="page-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>‹ Prev</button>`;
      for (let i = 1; i <= totalPages; i++) {
        html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
      }
      html += `<button class="page-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Next ›</button>`;
      html += `</div>`;
      row.innerHTML = html;
    }

    function changePage(p) {
      currentPage = p;
      renderTable();
    }

    function clearFilters() {
      document.getElementById('searchInput').value = '';
      document.getElementById('filterDate').value = '';
      currentPage = 1;
      renderTable();
    }

    function logout() {
      localStorage.removeItem('user');
      sessionStorage.removeItem('user');
      window.location.href = 'login.html';
    }

    function formatDate(d) {
      if (!d) return '—';
      const [y, m, day] = d.split('-');
      return `${day}/${m}/${y}`;
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
