<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Report Detail — WORKFLOW Inc.</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="styles/archive.css"/>
  <link rel="stylesheet" href="styles/archive-detail.css"/>
</head>
<body>

  <!-- ── Top Navbar ── -->
  <header class="top-navbar">
    <div class="navbar-brand">
      <span class="brand-icon">📋</span>
      <span class="brand-name">WORKFLOW Inc.</span>
    </div>
    <div class="navbar-right">
      <div class="bell-wrap">
        <span class="bell">🔔</span>
        <span class="bell-dot"></span>
      </div>
      <div class="user-pill">
        <span class="user-avatar">👤</span>
        <span class="user-label" id="userLabel">Narges (Out)</span>
        <button class="logout-btn" onclick="logout()">🚪 Logout</button>
      </div>
    </div>
  </header>

  <!-- ── Layout ── -->
  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-section-label">NAVIGATION</div>
      <nav>
        <a href="index.html" class="nav-item">
          <span class="nav-icon">📊</span> Dashboard
        </a>
        <a href="archive.html" class="nav-item active">
          <span class="nav-icon">📄</span> Archives
        </a>
        <a href="settings.html" class="nav-item">
          <span class="nav-icon">⚙️</span> Settings
        </a>
      </nav>
    </aside>

    <!-- Main content -->
    <main class="main-content">

      <a href="archive.html" class="back-link">‹ Back to Archives</a>

      <div id="detailWrap">
        <!-- injected by JS -->
      </div>

    </main>
  </div>

  <script>
    function logout() {
      localStorage.removeItem('user');
      sessionStorage.removeItem('user');
      window.location.href = 'login.html';
    }

    function getReports() {
      return JSON.parse(localStorage.getItem('wf_reports') || '[]');
    }

    function formatDate(d) {
      if (!d) return '—';
      const [y, m, day] = d.split('-');
      return `${day}/${m}/${y}`;
    }

    function escHtml(str) {
      return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    window.addEventListener('DOMContentLoaded', () => {
      // Username in navbar + role check
      let isAdmin = false;
      const raw = localStorage.getItem('user') || sessionStorage.getItem('user');
      if (raw) {
        try {
          const userObj = JSON.parse(raw);
          document.getElementById('userLabel').textContent = userObj.name + ' (Out)';
          isAdmin = userObj.role === 'admin';
        } catch {}
      }

      // Get id from URL
      const params = new URLSearchParams(window.location.search);
      const id = parseInt(params.get('id'), 10);
      const report = getReports().find(r => r.id === id);

      const wrap = document.getElementById('detailWrap');

      if (!report) {
        wrap.innerHTML = `<div class="not-found">⚠️ Report not found. It may have been removed.</div>`;
        return;
      }

      const statusClass = report.status === 'BLOCKER' ? 'badge-blocker' : 'badge-success';
      const statusLabel = report.status === 'BLOCKER' ? '🔴 BLOCKER' : '🟢 Success';
      const moodMap = {
        productive: { emoji: '💚', label: 'Productive' },
        okay:       { emoji: '💛', label: 'Okay' },
        burned:     { emoji: '🔴', label: 'Burned Out' }
      };
      const mood = moodMap[report.mood] || moodMap.okay;

      // Build feedback section based on role
      let feedbackSection = '';
      if (isAdmin) {
        feedbackSection = `
          <div class="detail-section feedback-section">
            <h3 class="detail-section-title">💬 Admin Feedback</h3>
            <textarea
              class="feedback-textarea"
              id="feedbackInput"
              placeholder="Write feedback for ${escHtml(report.employeeName || 'this employee')}..."
              rows="3"
            >${escHtml(report.feedback)}</textarea>
            <button class="btn-save-feedback" onclick="saveFeedback(${report.id})">💾 Save Feedback</button>
            <div class="feedback-saved-msg" id="feedbackSavedMsg">✅ Feedback saved!</div>
          </div>`;
      } else {
        feedbackSection = `
          <div class="detail-section feedback-section">
            <h3 class="detail-section-title">💬 Admin Feedback</h3>
            <p class="detail-text">${report.feedback ? escHtml(report.feedback) : '<span class="none-label">No feedback yet.</span>'}</p>
          </div>`;
      }

      wrap.innerHTML = `
        <div class="detail-header">
          <h2 class="page-title">📄 Report Details${isAdmin ? ' — ' + escHtml(report.employeeName || 'Employee') : ''}</h2>
          <span class="badge ${statusClass}">${statusLabel}</span>
        </div>

        <div class="detail-grid">
          <div class="detail-card">
            <span class="detail-label">📅 Date</span>
            <span class="detail-value">${formatDate(report.date)}</span>
          </div>
          <div class="detail-card">
            <span class="detail-label">🕐 Shift</span>
            <span class="detail-value">${escHtml(report.shift)}</span>
          </div>
          <div class="detail-card">
            <span class="detail-label">${mood.emoji} Mood Check-in</span>
            <span class="detail-value">${mood.label}</span>
          </div>
        </div>

        <div class="detail-section">
          <h3 class="detail-section-title">✅ Tasks Completed</h3>
          <p class="detail-text">${escHtml(report.tasks)}</p>
        </div>

        <div class="detail-section">
          <h3 class="detail-section-title">🚧 Blockers &amp; Challenges</h3>
          <p class="detail-text">${report.blockers ? escHtml(report.blockers) : '<span class="none-label">No blockers reported.</span>'}</p>
        </div>

        ${feedbackSection}

        <div class="detail-footer">
          Report ID: #${report.id}
        </div>
      `;
    });

    function saveFeedback(id) {
      const reports = getReports();
      const idx = reports.findIndex(r => r.id === id);
      if (idx === -1) return;

      reports[idx].feedback = document.getElementById('feedbackInput').value.trim();
      localStorage.setItem('wf_reports', JSON.stringify(reports));

      const msg = document.getElementById('feedbackSavedMsg');
      msg.style.display = 'block';
      setTimeout(() => msg.style.display = 'none', 2500);
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
