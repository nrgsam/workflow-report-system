<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Employee Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="styles/login.css">
</head>
<body>

  <div class="card-wrapper">
    <div class="login-card" id="loginCard">

      <div class="brand">
        <span class="brand-name">Login Form</span>
      </div>
      <div class="portal-subtitle">Employee Portal</div>

      <input class="form-control" type="text" id="username" placeholder="Username" autocomplete="username"/>
      <input  class="form-control"  type="password"  id="password"  placeholder="Password"  autocomplete="current-password" />

      <div class="remember-row">
        <input type="checkbox" id="rememberMe"/>
        <label for="rememberMe">Remember Me</label>
      </div>

      <button class="btn-signin" id="signInBtn" onclick="handleSignIn()">
        <span id="btnText"> Sign In</span>
      </button>

      <div class="error-msg" id="errorMsg"></div>

    </div>
  </div>

  <script>
    const VALID_USERNAME    = 'nargesAmam';
    const VALID_PASSWORD = '1234';

    function handleSignIn() {
      const username    = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const remember = document.getElementById('rememberMe').checked;
      const btn      = document.getElementById('signInBtn');
      const btnText  = document.getElementById('btnText');
      const errorMsg = document.getElementById('errorMsg');
      const card     = document.getElementById('loginCard');

      errorMsg.style.display = 'none';

      
      if (!username) { showError('Please enter your username.');  return; }
      if (!password) { showError('Please enter your password.');  return; }

      

    if (username === VALID_USERNAME && password === VALID_PASSWORD) {
      const store = remember ? localStorage : sessionStorage;
      store.setItem('user', JSON.stringify({ name: 'Narges', username }));
      window.location.href = 'dashboard.html';
    } else {
      btn.classList.remove('loading');
      btnText.style.display = 'block';
      showError('Invalid username or password.');
    };
    }

    function showError(msg) {
      const area = document.getElementById('errorMsg');
      area.textContent = msg;
      area.style.display = 'block';
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleSignIn(); });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
